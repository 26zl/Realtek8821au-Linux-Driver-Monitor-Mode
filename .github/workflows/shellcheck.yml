name: Shellcheck CI

on:
  workflow_dispatch:
  push:
    branches: [ final, work-in-progress ]
    paths: [ '**.sh' ]
  pull_request:
    branches: [ final, work-in-progress ]
    paths: [ '**.sh' ]

jobs:
  shellcheck:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - run: |
          sudo apt-get update -q
          sudo apt-get install -y shellcheck
      - name: Run shellcheck
        run: |
          find . -type f -name '*.sh' -print0 | xargs -0 -n1 shellcheck